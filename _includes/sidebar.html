<a href="{{ "/" | relative_url }}" class="sidebar-brand" aria-label="{{ site.title }} home">
  <span class="brand-mark" aria-hidden="true">TK</span>
  <div class="sidebar-text">
    <span class="sidebar-title">{{ site.title }}</span>
  </div>
</a>

<nav class="sidebar-nav" aria-label="Primary">
  <a href="{{ "/" | relative_url }}" aria-label="Profile" {% if page.url == "/" %}aria-current="page"{% endif %} class="sidebar-nav-link {% if page.url == "/" %}active{% endif %}">
    <span uk-icon="icon: user; ratio: 0.85" class="icon-sm" aria-hidden="true"></span>
    <span class="nav-label" aria-hidden="true">Profile</span>
  </a>
  <a href="{{ "/writing/" | relative_url }}" aria-label="Writing" {% if page.url contains "/writing" or page.layout == "post" %}aria-current="page"{% endif %} class="sidebar-nav-link {% if page.url contains "/writing" or page.layout == "post" %}active{% endif %}">
    <span uk-icon="icon: file-text; ratio: 0.85" class="icon-sm" aria-hidden="true"></span>
    <span class="nav-label" aria-hidden="true">Writing</span>
  </a>
  <a href="{{ "/work/" | relative_url }}" aria-label="Work" {% if page.url contains "/work" %}aria-current="page"{% endif %} class="sidebar-nav-link {% if page.url contains "/work" %}active{% endif %}">
    <span uk-icon="icon: grid; ratio: 0.85" class="icon-sm" aria-hidden="true"></span>
    <span class="nav-label" aria-hidden="true">Work</span>
  </a>
  <a href="{{ "/contact/" | relative_url }}" aria-label="Contact" {% if page.url contains "/contact" %}aria-current="page"{% endif %} class="sidebar-nav-link {% if page.url contains "/contact" %}active{% endif %}">
    <span uk-icon="icon: mail; ratio: 0.85" class="icon-sm" aria-hidden="true"></span>
    <span class="nav-label" aria-hidden="true">Contact</span>
  </a>
  <a href="{{ "/search/" | relative_url }}" aria-label="Search" {% if page.url contains "/search" %}aria-current="page"{% endif %} class="sidebar-nav-link {% if page.url contains "/search" %}active{% endif %}">
    <span uk-icon="icon: search; ratio: 0.85" class="icon-sm" aria-hidden="true"></span>
    <span class="nav-label" aria-hidden="true">Search</span>
  </a>
</nav>

<button
  id="sidebar-toggle"
  aria-label="Collapse sidebar"
  title="Collapse sidebar">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" class="sidebar-toggle-icon">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
</button>
