<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% seo %}

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@400;500&family=Fira+Code:wght@400&display=swap" rel="stylesheet">

<!-- UIKit -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.6/dist/css/uikit.min.css" />

<!-- Tailwind (Play CDN with Typography plugin) -->
<script src="https://cdn.tailwindcss.com?plugins=typography"></script>
<script>
  tailwind.config = {
    corePlugins: { preflight: false },
    theme: {
      extend: {
        fontFamily: {
          display: ['"Playfair Display"', 'Georgia', 'serif'],
          sans:    ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'sans-serif'],
          mono:    ['"Fira Code"', '"Cascadia Code"', '"Source Code Pro"', 'Menlo', 'monospace'],
        },
        colors: {
          obsidian: '#1C1D21',
          ink:      '#2E3039',
          storm:    '#5B6070',
          mist:     '#E2E4EA',
          cloud:    '#F5F6F8',
          accent: {
            50:  '#EBF0F4',
            100: '#C4CED8',
            400: '#7A95A8',
            600: '#4D7287',
            800: '#2C4F61',
          },
        },
        typography: {
          DEFAULT: {
            css: {
              color: '#1C1D21',
              maxWidth: 'none',
              h2: { fontFamily: '"Playfair Display", Georgia, serif', fontWeight: '500', color: '#1C1D21' },
              h3: { fontFamily: 'Inter, sans-serif', fontWeight: '500', color: '#1C1D21' },
              a: { color: '#4D7287', textDecoration: 'none', '&:hover': { color: '#2C4F61' } },
              code: { backgroundColor: '#F5F6F8', borderRadius: '4px', padding: '2px 6px', fontWeight: '400' },
              'code::before': { content: 'none' },
              'code::after':  { content: 'none' },
              pre: { backgroundColor: '#F5F6F8', border: '0.5px solid #E2E4EA' },
              blockquote: { borderLeftColor: '#4D7287', fontStyle: 'italic', color: '#5B6070' },
              strong: { color: '#1C1D21' },
            }
          }
        }
      }
    }
  }
</script>

<link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
