---
layout: default
---

<article class="max-w-[680px]">

  <p class="text-xs text-storm tracking-wide mb-10">{{ page.date | date: "%B %-d, %Y" }}</p>

  <div class="prose max-w-none">
    {{ content }}
  </div>

  <footer class="mt-16 pt-8 border-t border-mist">
    {% if page.tags.size > 0 %}
      <div class="flex flex-wrap gap-2 mb-8">
        {% for tag in page.tags %}
          <a href="{{ site.baseurl }}/tag/{{ tag | slugify }}" class="tag-pill">{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}

    <a href="{{ "/writing/" | relative_url }}" class="inline-flex items-center gap-2 text-sm text-storm no-underline hover:text-obsidian transition-colors">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to writing
    </a>
  </footer>

</article>
