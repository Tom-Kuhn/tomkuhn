bio: |
  Highly motivated Staff Engineer with extensive experience operating at the intersection between engineering, architecture, and strategic initiatives within a complex enterprise environment. Passionate about solving ambiguous, enterprise-scale problems through systems thinking, architectural leadership, platform modernisation, domain-driven design adoption, and engineering transformation.

  Recognised for building alignment through influence rather than authority and for translating strategic objectives into actionable engineering direction, thereby driving engineering and architectural excellence across large organisations. Combines strategic leadership with strong technical depth, remaining actively engaged in architecture definition, design reviews, and hands-on engineering where required.

